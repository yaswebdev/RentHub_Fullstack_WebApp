spring.application.name=renthub-backend

# Database
spring.datasource.url=jdbc:postgresql://localhost:5433/renthub_db
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT
app.jwt.secret=renthub-super-secret-key-256-bits-long-change-in-prod-2026
app.jwt.expiration=86400000

# Stripe (replace with your sk_test_... key)
stripe.secret.key=${STRIPE_SECRET_KEY}

# Google Maps (optional for now)
google.maps.api.key=YOUR_GOOGLE_MAPS_KEY