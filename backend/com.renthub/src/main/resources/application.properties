spring.application.name=renthub-backend

# Database
spring.datasource.url=jdbc:postgresql://localhost:5433/renthub_db
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# Stripe (replace with your sk_test_... key)
stripe.secret.key=${STRIPE_SECRET_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}

# Google Maps (optional for now)
google.maps.api.key=YOUR_GOOGLE_MAPS_KEY

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/photos

# Serve uploaded files as static resources
spring.web.resources.static-locations=classpath:/static/,file:./