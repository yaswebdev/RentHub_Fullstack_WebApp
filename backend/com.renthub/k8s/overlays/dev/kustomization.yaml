apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: renthub-dev

resources:
  - ../../base

labels:
  - pairs:
      environment: dev

images:
  - name: registry.sportscore.tech/renthub-backend
    newTag: dev-latest

replicas:
  - name: renthub-backend
    count: 1

patches:
  - path: ingress-patch.yaml
  - path: env-patch.yaml
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: renthub-backend
      spec:
        template:
          spec:
            containers:
              - name: renthub-backend
                resources:
                  requests:
                    memory: "768Mi"
                    cpu: "500m"
                  limits:
                    memory: "2Gi"
                    cpu: "2000m"
  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: renthub-backend-hpa
      spec:
        minReplicas: 1
        maxReplicas: 3
