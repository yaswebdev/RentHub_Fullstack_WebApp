apiVersion: apps/v1
kind: Deployment
metadata:
  name: renthub-backend
  labels:
    app: renthub-backend
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: renthub-backend
  template:
    metadata:
      labels:
        app: renthub-backend
        version: v1
    spec:
      containers:
      - name: renthub-backend
        image: registry.sportscore.tech/renthub-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
      imagePullSecrets:
      - name: docker-registry-secret
      restartPolicy: Always
