apiVersion: apps/v1
kind: Deployment
metadata:
  name: renthub-frontend
  labels:
    app: renthub-frontend
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: renthub-frontend
  template:
    metadata:
      labels:
        app: renthub-frontend
        version: v1
    spec:
      containers:
      - name: renthub-frontend
        image: registry.sportscore.tech/renthub-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        env:
        - name: VITE_API_URL
          value: "http://localhost:8080/api"
      imagePullSecrets:
      - name: docker-registry-secret
      restartPolicy: Always
